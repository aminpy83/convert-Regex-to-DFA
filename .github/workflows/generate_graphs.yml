name: Generate Automata Graphs

on:
  push:
    branches: [ "main", "master" ]
  # اضافه شدن قابلیت اجرای دستی با ورودی دلخواه
  workflow_dispatch:
    inputs:
      regex:
        description: 'Enter your Regex string (e.g., (a|b)*abb)'
        required: true
        default: '(a|c)*'

jobs:
  build-and-graph:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Graphviz
      run: |
        sudo apt-get update
        sudo apt-get install -y graphviz

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install graphviz

    # در اینجا مقدار ورودی را به اسکریپت پایتون پاس می‌دهیم
    - name: Run Graph Generator
      run: |
        # اگر دکمه دستی زده شده بود از ورودی استفاده کن، در غیر این صورت مقدار پیش‌فرض
        REGEX_INPUT="${{ inputs.regex }}"
        if [ -z "$REGEX_INPUT" ]; then REGEX_INPUT="(a|c)*"; fi
        python graph.py "$REGEX_INPUT"
      # اگر فایل‌هایت هنوز داخل پوشه هستند خط زیر را فعال نگه دار، در غیر این صورت پاکش کن:
      # working-directory: "Regex to DFA"

    - name: Upload Generated Graphs
      uses: actions/upload-artifact@v4
      with:
        name: automata-visualizations
        path: "*.png" # یا "Regex to DFA/*.png" بسته به محل فایل‌ها
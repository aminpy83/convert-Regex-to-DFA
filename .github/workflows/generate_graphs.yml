name: Generate Automata Graphs

on:
  push:
    branches: [ "main", "master" ]
  # اضافه شدن قابلیت اجرای دستی با ورودی دلخواه
  workflow_dispatch:
    inputs:
      regex:
        description: 'Enter your Regex string (e.g., (a|b)*abb)'
        required: true
        default: '(a|c)*'

jobs:
  build-and-graph:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install graphviz

      # ۵. اجرای اسکریپت با رعایت حروف بزرگ و پوشه کاری
      - name: Run Graph Generator
        run: |
          REGEX_INPUT="${{ inputs.regex }}"
          if [ -z "$REGEX_INPUT" ]; then REGEX_INPUT="(a|c)*"; fi
          python Graph.py "$REGEX_INPUT"
        working-directory: "Regex to DFA" # 👈 اگر فایل‌ها داخل این پوشه هستند این خط حیاتی است

      # ۶. آپلود فایل‌ها از داخل پوشه درست
      - name: Upload Generated Graphs
        uses: actions/upload-artifact@v4
        with:
          name: automata-visualizations
          path: "Regex to DFA/*.png" # 👈 آدرس دقیق عکس‌ها برای آپلود